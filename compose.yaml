# End-to-end dev stack: gz-sim (camera) + gazebo_bridge (RTSP).
# View from the host: ./scripts/view-stream.sh   OR   ffplay rtsp://127.0.0.1:8554/stream
#
# Harmonic uses gz-transport13; bridge image is built with matching dev packages.

services:
  sim:
    build:
      context: .
      dockerfile: Dockerfile.sim
    environment:
      LIBGL_ALWAYS_SOFTWARE: "1"
    networks: [gz_net]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "gz topic -l 2>/dev/null | grep -q 'sensor/camera/image' || exit 1",
        ]
      interval: 5s
      timeout: 15s
      retries: 40
      start_period: 60s

  bridge:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GZ_TRANSPORT_DEV_PKG: libgz-transport13-dev
        GZ_TRANSPORT_PC_MODULE: gz-transport13
    environment:
      CAMERA_TOPIC: /world/camera_sensor/model/camera/link/link/sensor/camera/image
    ports:
      - "8554:8554"
    depends_on:
      sim:
        condition: service_healthy
    networks: [gz_net]

networks:
  gz_net:
    driver: bridge
